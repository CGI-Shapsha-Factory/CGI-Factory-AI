# Garde-fou local (pre-commit) : bloque un commit qui ajoute de la source sans test associe.
# Installer une fois : `lefthook install`  (https://github.com/evilmartians/lefthook)
# lefthook = binaire unique, polyglotte. Alternatives : husky (projet JS pur), pre-commit (Python).
# Note : contournable avec `git commit --no-verify`. La vraie protection non contournable multi-personnes
# est une protection cote serveur (ruleset GitHub) — a la charge de l'equipe, hors perimetre de la Factory.
pre-commit:
  parallel: true
  commands:
    tests-accompany-source:
      run: python .claude/hooks/tests_guard.py check {staged_files}
